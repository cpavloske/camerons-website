<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
      font-family: 'JetBrains Mono', monospace;
    }
    .site {
      font-size: 22px;
      color: #4f8ef7;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }
    .site span { color: #7c6af7; }
    h1 {
      font-size: 56px;
      font-weight: 700;
      color: #f0f4ff;
      line-height: 1.2;
      margin-bottom: 30px;
    }
    .date {
      font-size: 20px;
      color: rgba(240, 244, 255, 0.4);
    }
    .border-left {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, #4f8ef7, #7c6af7);
    }
  </style>
</head>
<body>
  <div class="border-left"></div>
  <div class="site">cam<span>.</span></div>
  <h1>Why I Work at Neat</h1>
  <div class="date">February 28, 2026</div>
</body>
</html>
